<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Wishes</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top, #2b1055, #120136, #000);
    position:relative;
    color:white;
}

/* Main Layout */
.container{
    display:flex;
    align-items:center;
    gap:30px;
    z-index:2;
}

/* Stars Background */
.stars{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{
        opacity:0.2;
    }
    to{
        opacity:1;
    }
}

/* Main Card */
.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:420px;
    padding:40px 25px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
    animation:floatCard 4s ease-in-out infinite;
}

/* Photo Card */
.photo-card{
    width:300px;
    padding:20px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
    text-align:center;
    animation:floatCard 4s ease-in-out infinite;
}

.photo-card img{
    width:100%;
    height:380px;
    object-fit:cover;
    border-radius:20px;
    border:3px solid rgba(255,255,255,0.4);
}

.photo-card h3{
    margin-top:15px;
    color:#ffd6ff;
}

@keyframes floatCard{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-10px);
    }
}

.cake{
    font-size:5rem;
    margin-bottom:10px;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

h1{
    font-family:'Great Vibes', cursive;
    font-size:3.5rem;
    margin-bottom:10px;
    color:#ffd6ff;
}

h2{
    font-size:1.5rem;
    margin-bottom:15px;
    color:#fff;
}

p{
    font-size:1rem;
    line-height:1.8;
    color:#f3e8ff;
    margin-bottom:30px;
}

.btn{
    padding:14px 30px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#ff4d6d,#ff9e00);
    color:white;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(255, 77, 109, 0.4);
}

.btn:hover{
    transform:scale(1.08);
}

/* Floating Hearts */
.heart{
    position:absolute;
    bottom:-50px;
    color:#ff85a2;
    animation:floatUp linear infinite;
    z-index:1;
}

@keyframes floatUp{
    from{
        transform:translateY(0) scale(1);
        opacity:1;
    }
    to{
        transform:translateY(-120vh) scale(1.5);
        opacity:0;
    }
}

/* Responsive */
@media(max-width:900px){

.container{
    flex-direction:column;
}

.photo-card{
    width:90%;
}

h1{
    font-size:2.7rem;
}

h2{
    font-size:1.2rem;
}

.cake{
    font-size:4rem;
}

p{
    font-size:0.95rem;
}

}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

<div class="card">
    <div class="cake">🎂</div>

    <h1>Happy Birthday Opiyo Simon Peter</h1>

    <h2>As a Special friend✨</h2>

    <p>
        May your birthday shine brighter than the stars above.
        May happiness, love, success, and peace follow you every
        single day of your beautiful life. Enjoy your special day!
    </p>

    <button class="btn" onclick="launchConfetti()">
        Click For A Surprise 🎉
    </button>
</div>

<!-- Added Photo Card Only -->
<div class="photo-card">
    <img src="./2.png" alt="My Photo">
    <h3>Simon Peter ✨</h3>
</div>

</div>

<script>

// Create Stars
const starsContainer = document.getElementById("stars");

for(let i = 0; i < 120; i++){

    let star = document.createElement("div");
    star.classList.add("star");

    star.style.left = Math.random() * 100 + "%";
    star.style.top = Math.random() * 100 + "%";

    star.style.animationDuration =
        (Math.random() * 3 + 1) + "s";

    starsContainer.appendChild(star);
}

// Floating Hearts
function createHeart(){

    let heart = document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize =
        (Math.random() * 20 + 15) + "px";

    heart.style.animationDuration =
        (Math.random() * 5 + 5) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 10000);
}

setInterval(createHeart, 500);

// Confetti Function
function launchConfetti(){

    confetti({
        particleCount:250,
        spread:120,
        origin:{ y:0.6 }
    });

    confetti({
        particleCount:120,
        angle:60,
        spread:80,
        origin:{ x:0 }
    });

    confetti({
        particleCount:120,
        angle:120,
        spread:80,
        origin:{ x:1 }
    });
}

// Auto Confetti on Load
window.onload = () => {
    launchConfetti();
};

</script>

</body>
</html>
